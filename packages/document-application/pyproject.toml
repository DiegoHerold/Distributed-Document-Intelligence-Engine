[project]
name = "eixo-document-application"
version = "0.1.0"
description = "Transport-independent application use cases for Eixo."
requires-python = ">=3.12"
dependencies = ["eixo-document-core", "eixo-plugins", "eixo-artifacts"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.application*"]
