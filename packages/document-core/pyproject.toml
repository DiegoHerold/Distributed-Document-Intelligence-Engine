[project]
name = "eixo-document-core"
version = "0.1.0"
description = "Fundamental types and public processing contracts for Eixo."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.core*", "eixo.pdf*"]
