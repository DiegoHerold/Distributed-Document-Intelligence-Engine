[project]
name = "eixo-runtime-local"
version = "0.1.0"
description = "Local runtime namespace for future execution phases."
requires-python = ">=3.12"
dependencies = ["eixo-document-core", "eixo-plugins"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.runtime.local*"]
