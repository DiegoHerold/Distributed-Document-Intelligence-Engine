[project]
name = "eixo-document-model"
version = "0.1.0"
description = "Canonical document model placeholders for future phases."
requires-python = ">=3.12"
dependencies = ["eixo-document-core"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.model*"]

