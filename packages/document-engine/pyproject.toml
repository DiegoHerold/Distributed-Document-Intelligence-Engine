[project]
name = "eixo-document-engine"
version = "0.1.0"
description = "Initial engine composition for Eixo."
requires-python = ">=3.12"
dependencies = [
    "eixo-document-core",
    "eixo-document-application",
    "eixo-plugins",
    "eixo-runtime-local",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.engine*"]
