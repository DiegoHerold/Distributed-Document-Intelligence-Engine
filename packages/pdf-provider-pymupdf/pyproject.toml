[project]
name = "eixo-pdf-provider-pymupdf"
version = "0.1.0"
description = "PyMuPDF-backed native PDF provider for Eixo."
requires-python = ">=3.12"
dependencies = [
    "eixo-document-core",
    "eixo-document-application",
]

[project.optional-dependencies]
backend = [
    "pymupdf>=1.24",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eixo.providers.pdf.pymupdf*"]

[tool.setuptools.package-data]
"eixo.providers.pdf.pymupdf" = ["py.typed"]
